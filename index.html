<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מחשבון שקילה - Keter Deco</title>
    <style>
        body { font-family: sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; direction: rtl; }
        .card { background: #0f172a; border: 1px solid #334155; border-radius: 25px; padding: 25px; width: 90%; max-width: 380px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        h1 { color: #22d3ee; text-align: center; margin: 0 0 10px 0; font-size: 24px; }
        p.sub { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .row > div { flex: 1; }
        input { w-full; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; text-align: center; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #22d3ee; }
        button.calc { background: linear-gradient(to right, #0891b2, #2563eb); border: none; color: white; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #res-box { margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; display: none; text-align: center; }
        .val-big { font-size: 50px; font-weight: bold; color: #22d3ee; display: block; }
        .unit { font-size: 18px; color: #94a3b8; }
        .msg { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-top: 10px; font-weight: bold; }
        button.share { background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.3); color: #25d366; padding: 10px; border-radius: 12px; width: 100%; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>מחשבון שקילה (GSM)</h1>
        <p class="sub">פריימר, לבן, לבן פריימר, לכה</p>
        
        <label>הגדרת יעד (אופציונלי)</label>
        <div class="row">
            <input type="number" id="min" placeholder="מינימום">
            <input type="number" id="max" placeholder="מקסימום">
        </div>

        <div class="row">
            <div class="input-group">
                <label>אורך (ס"מ)</label>
                <input type="number" id="L" placeholder="120">
            </div>
            <div class="input-group">
                <label>רוחב (ס"מ)</label>
                <input type="number" id="W" placeholder="80">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>משקל לפני (g)</label>
                <input type="number" step="0.1" id="w1" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>משקל אחרי (g)</label>
                <input type="number" step="0.1" id="w2" placeholder="0.0" style="color: #22d3ee; border-color: #0e7490;">
            </div>
        </div>

        <button class="calc" onclick="calc()">חשב תוצאה</button>

        <div id="res-box">
            <span id="val" class="val-big">0.0</span>
            <span class="unit">g/m²</span>
            <br>
            <span id="msg" class="msg"></span>
            <button class="share" onclick="share()">שתף בוואטסאפ</button>
        </div>
    </div>

    <script>
        // ניקוי אוטומטי בלחיצה
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() { this.value = ''; });
        });

        let curR = "", curS = "";
        function calc() {
            const L = parseFloat(document.getElementById('L').value), W = parseFloat(document.getElementById('W').value),
                  w1 = parseFloat(document.getElementById('w1').value), w2 = parseFloat(document.getElementById('w2').value),
                  mi = parseFloat(document.getElementById('min').value), ma = parseFloat(document.getElementById('max').value),
                  rb = document.getElementById('res-box'), v = document.getElementById('val'), m = document.getElementById('msg');
            
            rb.style.display = 'block';
            if(!L || !W || isNaN(w1) || isNaN(w2) || w1 >= w2) { 
                v.innerText = "ERR"; v.style.color = "#ef4444"; 
                m.innerText = "נתונים לא תקינים"; return; 
            }
            
            const g = (w2 - w1) / ((L/100)*(W/100)); curR = g.toFixed(1);
            v.innerText = curR;
            
            if(!isNaN(mi) && !isNaN(ma)) {
                if(g >= mi && g <= ma) { 
                    v.style.color = "#22c55e"; m.innerText = "תקין ✅"; m.style.color = "#4ade80"; 
                    curS = "תקין (PASS)";
                } else { 
                    v.style.color = "#ef4444"; m.style.color = "#f87171";
                    m.innerText = g < mi ? "חסר חומר ❌" : "עודף חומר ❌";
                    curS = g < mi ? "חריגה למטה" : "חריגה למעלה";
                }
            } else { v.style.color = "#22d3ee"; m.innerText = ""; curS = "ללא יעד"; }
        }

        function share() {
            const txt = `*בקרת איכות - Keter Deco*\nתוצאה: ${curR} g/m²\nסטטוס: ${curS}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }
    </script>
</body>
</html>
